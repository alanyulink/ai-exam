name: 部署到 GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 获取阿里云 TTS Token 并注入
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_APP_KEY: ${{ secrets.ALIYUN_APP_KEY }}
        run: |
          # 1. 获取 Token
          TOKEN=$(python3 -c "
import os, sys, json, time, hmac, hashlib, base64, urllib.parse, urllib.request
ak_id = os.environ['ALIYUN_ACCESS_KEY_ID']
ak_secret = os.environ['ALIYUN_ACCESS_KEY_SECRET']
def pe(s):
    s = urllib.parse.quote(str(s), safe='')
    for a,b in (('!','%21'),(\"'\",'%27'),('(','%28'),(')','%29'),('*','%2A')): s=s.replace(a,b)
    return s
p = {'AccessKeyId':ak_id,'Action':'CreateToken','Format':'JSON','SignatureMethod':'HMAC-SHA1','SignatureNonce':str(int(time.time()*1000)),'SignatureVersion':'1.0','Timestamp':time.strftime('%Y-%m-%dT%H:%M:%SZ',time.gmtime()),'Version':'2019-02-28'}
k=sorted(p.keys())
q='&'.join(f'{pe(x)}={pe(p[x])}' for x in k)
s=b64=base64.b64encode(hmac.new((ak_secret+'&').encode(),('GET&'+pe('/')+'&'+pe(q)).encode(),hashlib.sha1).digest()).decode()
p['Signature']=s
u='https://nls-meta.cn-shanghai.aliyuncs.com/?'+urllib.parse.urlencode(p,safe='')
with urllib.request.urlopen(u,timeout=15) as r: d=json.loads(r.read().decode())
print(d['Token']['Id'])
")
          echo "Token: ${TOKEN:0:8}..."

          # 2. 注入到 tts.js
          python3 -c "
import re
with open('js/tts.js','r') as f: c=f.read()
c=re.sub(r'__token: null',\"__token: '\" + open('/dev/stdin').read().strip() + \"'\",c)
with open('js/tts.js','w') as f: f.write(c)
" <<< "$TOKEN"

          # 3. 验证
          echo "=== 注入验证 ==="
          grep '__token:' js/tts.js
          echo "=== 文件大小 ==="
          wc -c js/tts.js

      - name: 部署到 gh-pages 分支
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          force_orphan: true
