name: 部署到 GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: 生成阿里云 TTS Token
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_APP_KEY: ${{ secrets.ALIYUN_APP_KEY }}
          ALIYUN_TTS_VOICE: ruoxi
        run: |
          echo "=== 修改前 ==="
          grep -o '__token: .*' js/tts.js || echo 'NOT FOUND'
          echo "=== 执行 gen_token.py ==="
          python3 build/gen_token.py
          echo "=== 修改后 ==="
          grep -o '__token: .*' js/tts.js

      - name: 确认文件存在
        run: |
          echo "=== 文件清单 ==="
          ls -la js/tts.js
          wc -c js/tts.js
          echo "=== hash ==="
          md5sum js/tts.js

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4