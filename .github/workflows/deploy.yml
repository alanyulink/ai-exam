name: 部署到 GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: 复制项目文件到 _site
        run: |
          mkdir -p _site
          tar --exclude='.git' --exclude='_site' --exclude='.trae' --exclude='build' --exclude='server.py' --exclude='start.sh' -cf - . | tar -xf - -C _site/
          echo "=== _site 文件清单 ==="
          ls -la _site/js/

      - name: 获取 Token 并注入到 _site/js/tts.js
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_APP_KEY: ${{ secrets.ALIYUN_APP_KEY }}
        run: |
          python3 build/gen_token.py --output-dir _site
          echo "=== 验证 ==="
          grep -o '__token: .*' _site/js/tts.js

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4